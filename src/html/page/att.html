<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://dew-1251587647.cos.ap-guangzhou.myqcloud.com/html/common.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://dew-1251587647.cos.ap-guangzhou.myqcloud.com/html/att.css" media="print" onload="this.media='all'">
</head>

<body style="width: 1091px;">
    <div style="font-family: cn;" id="mw-content-text" class="mw-body-content mw-content-ltr" lang="zh-Hans-CN" dir="ltr">
        <div class="mw-parser-output">
            <div class="row">
                <div class="col-lg-4 col-xs-12 kapai">
                    <p>
                    <div style="width: 396px;
                        height: 694px;
                        overflow: hidden;
                        position: absolute;
                        transform: rotate(-4deg);
                        left: 56px;
                        top: 46px;
                        border-radius: 25px;">
                        <img style="width: 100%;
                            max-width: 100%;
                            transform: rotate(0deg);
                            left: 0px;
                            border-radius: 10px;
                            top: 0px;" alt="角色形象.png"
                            src="http://img2.baidu.com/it/u=2748027699,426462863&fm=253&app=138&f=JPEG?w=800&h=1778"
                            class="kapai-img">
                    </div>

                    <img src="https://patchwiki.biligame.com/images/ys/5/50/5h8jokudwhvc7dq4gde7xoio4sd5eqy.png"
                        width="570" height="977" class="kapai-img">
                    <img
                        src="https://patchwiki.biligame.com/images/ys/1/1b/j9h26xpbofd4y01phg7tak1hw3xe4mi.png"
                        width="234" height="286" class="kapai-dice">
                    <img
                        src="https://patchwiki.biligame.com/images/ys/b/bc/eq3ly6lrq4mpcq6x4c65ry9990aqrz2.png"
                        width="496" height="404" class="kapai-stripe">
                    </p>
                    <div class="kapai-more">
                        <div class="font-f">Lv.{{leve}}</div>
                        <div class="font-comm">空白区2</div>
                    </div>
                </div>
                <div class="col-lg-4 col-xs-12 kapai-data">
                    <div class="data-topbox">
                        <p><img alt="卡牌UI-元素-风.png"
                                src="https://patchwiki.biligame.com/images/ys/3/35/nbqoy2m63thzml89w159ini4yq8gi6w.png"
                                width="128" height="128">
                        </p>
                        <div style="width: calc(100% - 56px)" class="flex-col">
                            <div class="flex-row" style="border-bottom: 1px solid #b9b2ab; padding-bottom: 4px;">
                                <div style="font-weight: lighter;">宝宝巴士</div>
                                <div>基因锁:未开启</div>
                            </div>
                            <div class="flex-row">
                                <div style="font-size:26px;">{{name}}</div>
                                <div class="flex-col" style="text-align: right; ">
                                    <!-- 境界名称 -->
                                    <div>{{className}}</div>
                                    <div>{{sys}} · {{inherit}}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <p><img alt="calss=bea-line"
                            src="https://patchwiki.biligame.com/images/ys/4/42/npwdj013fq4kjtra6yrz1hnaxty0o0f.png"
                            title="calss=bea-line" width="1330" height="31">
                    </p>
                    <div class="kapai-data-bg"></div>
                    <div class="jiNeng-box flex-col" style="font-size: 24px;">
                        <div class="jiNeng flex-row">
                            <div style="width: calc(100%);color:#FFFFFF" class="flex-col" >
                            {{#each barstr}}
                            <div style="margin-bottom: 10px;">
                                <div style="width: 100%;height: 24px;background: rgba(255,255,255,0.2);border-radius: 15px;position: relative;">
                                    <div style="width: {{this.bar}}%;height: 100%;background: rgba(255,255,255,0.8);border-radius: 15px;"></div>
                                    <div style="width: 100%;
    text-align: center;position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);color: #000;text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;font-size: 21px;">{{this.key}}</div>
                                </div>
                            </div>
                            {{/each}}
                            </div>
                        </div>
                        <div class="jiNeng flex-row">
                            <div style="width: calc(100% - 64px);color:#FFFFFF" class="flex-col" >
                                {{#each att}}
                                <div>{{this}}</div>
                                {{/each}}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<style>

.kapai-more>div:nth-child(1) {
    font-size: 30px;

}
</style>
</html>
