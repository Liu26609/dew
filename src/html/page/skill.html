<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link  rel="stylesheet" href="../common.css">
</head>
<body style="background: red;width: 813px;height: 1187px;">
    <div class="title">
        {{name}}
    </div>
    <div class="style_img">
        <img src="{{show}}" alt="" srcset="">
    </div>
    <div class="skill_desc">
        🆎{{sk_type}}/{{useUp}}/⌛CD{{cd}}秒,技能效果如下:<br>{{desc}}
    </div>
    <div class="score_div">
        评分:{{score}}
    </div>
    <div class="score_leve">
        LV.{{leve.num}}({{leve_bar}})
    </div>

    <img src="https://gitee.com/ChuXuanD30/resources_skill/raw/master/bg/1.jpg" alt="" srcset="">
    
</body>
<style>
    @font-face {
    font-family: 'xiaomai';
    src: url('../font/xiaomai.ttf');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'ttf';
    src: url('../font/ttf_cn.ttf');
    font-weight: normal;
    font-style: normal;
}
@font-face {
    font-family: 'number';
    src: url('../font/number.ttf');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'cn';
    src: url('../font/cn.ttf');
    font-weight: normal;
    font-style: normal;
}

.icon {
    width: 1em;
    height: 1em;
    vertical-align: -0.15em;
    fill: currentColor;
    overflow: hidden;
}

.iconfont {
    font-weight: 100!important;
    display: inline!important;
}

.font_xiaomai {
    font-family:  xiaomai;
}

.font_ttf {
    font-family:  ttf;
}

body {
    margin: 0;
    /* width: 200vw; */
}

img {
    display: block;
}


.bar_line {
    width: 97%;
    display: flex;
    align-items: center;

}

.bar {
    background: red;
    height: 16px;
    width: 100%;
    border-radius: 5px;

    display: flex;
    justify-content: center;
    /* 水平居中 */
    align-items: center;
    /* 垂直居中 */
}

.bar span {
    position: absolute;
    display: inline-block;
    vertical-align: middle;
    font-size: 15px;
    right: 18px;
    font-family:xiaomai
}
</style>
<style>

}

}
